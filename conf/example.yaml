# =============================================================================
# NeoProxy Configuration File Example
# =============================================================================
# Usage: ./neoproxy -c conf/example.yaml
#
# Prerequisites:
#   1. Run ./generate_certs.sh to generate certificates
#   2. server.crt must contain full chain (server cert + CA cert)
#   3. Restart neoproxy after regenerating certificates
#   4. TLS examples use --resolve to avoid editing /etc/hosts
#
# Quick test (HTTP proxy, no auth):
#   curl --proxy http://127.0.0.1:8080 https://httpbin.org/ip

# -----------------------------------------------------------------------------
# Global Settings
# -----------------------------------------------------------------------------

# Server threads - controls concurrent processing capacity
# Default: 4
server_threads: 2

# TLS crypto provider: "ring" (default) or "openssl" (requires tls-openssl feature)
# Default: ring
#tls_provider: openssl

# -----------------------------------------------------------------------------
# Plugin Configuration
# -----------------------------------------------------------------------------
# Plugin-specific configuration sections.
# Each plugin parses its own section independently.

plugins:
  access_log:
    writers:
      # Default access log writer
      - path_prefix: "logs/access.log"
        # buffer_capacity: "32KiB"      # Flush-triggering buffer size (default: 32KiB)
        # max_buffer_size: "128KiB"     # Max buffer; drops entries when full (default: 128KiB)
        # flush_interval: "1s"         # Max time between flushes (default: 1s)
        # max_file_size: "200MiB"       # Max file size before rotation (default: 200MiB)
        # rotate_daily: true           # Rotate at date boundary (default: true)
        # format: "text"               # Log format: text / json (default: text)

  # HTTP Upstream Plugin - unified proxy service configuration
  # Defines upstream pools with three-level inheritance:
  #   Plugin → Upstream → Address
  http_upstream:
    certificates:
      client_cert_path: conf/certs/client.crt
      client_key_path: conf/certs/client.key
      server_ca_path: conf/certs/server-ca.crt
    upstreams:
      # Direct mode (no addresses) - connects directly to target
      - name: direct
        tunnel_idle_timeout: "60s"
        http:
          connect_timeout: "10s"

      # Chain mode (with addresses) - connects through upstream proxy
      - name: local_relay
        addresses:
          - address: "127.0.0.1:10443"
            hostname: "proxy.example.com"
            weight: 1
            user:
              username: "admin"
              password: "secret"
            http3: {}

# -----------------------------------------------------------------------------
# Listeners
# -----------------------------------------------------------------------------
# Listeners define how neoproxy accepts connections.
# Each listener has:
#   - name: Unique listener name (referenced by servers)
#   - kind: Listener type ("http", "https", "http3", "socks5")
#   - addresses: List of "host:port" addresses to bind
#   - args: Listener-type-specific parameters (optional)

listeners:
  # HTTP listener - no extra args
  - name: http_chain
    kind: http
    addresses: ["127.0.0.1:8080"]

  # HTTPS listener - supports TLS handshake timeout
  - name: https_chain
    kind: https
    addresses: ["127.0.0.1:8443"]
    args:
      # TLS handshake timeout (default: 5s)
      tls_handshake_timeout: "5s"

  # HTTP/3 listener - supports QUIC protocol tuning
  - name: http3_chain
    kind: http3
    addresses: ["127.0.0.1:8443"]
    args:
      quic:
        # Max concurrent bidirectional QUIC streams (default: 100, range: 1-10000)
        max_concurrent_bidi_streams: 100
        # Max idle timeout (default: 5s)
        max_idle_timeout: "5s"
        # Initial MTU (default: 1200, range: 1200-9000)
        initial_mtu: 1200
        # QUIC send window (default: 10MiB)
        send_window: "10MiB"
        # QUIC receive window (default: 10MiB)
        receive_window: "10MiB"

  # SOCKS5 listener - supports handshake timeout and user authentication
  - name: socks5_chain
    kind: socks5
    addresses: ["127.0.0.1:9080"]
    args:
      # Handshake timeout (default: 3s)
      handshake_timeout: "3s"
      # User/password authentication (omit for no auth)
      users:
        - username: "admin"
          password: "secret"

  # HTTP listener on alternate port (for connect_proxy)
  - name: http_connect
    kind: http
    addresses: ["127.0.0.1:10080"]

  # HTTPS listener on alternate port
  - name: https_connect
    kind: https
    addresses: ["127.0.0.1:10443"]

  # HTTP/3 listener on alternate port (for connect_proxy)
  - name: http3_connect
    kind: http3
    addresses: ["127.0.0.1:10443"]

  # SOCKS5 listener on alternate port (no auth)
  - name: socks5_connect
    kind: socks5
    addresses: ["127.0.0.1:11080"]

# -----------------------------------------------------------------------------
# Services
# -----------------------------------------------------------------------------
# Services define request handlers. Each service has:
#   - name: Service name (referenced by servers)
#   - kind: Service type in "plugin.service" format
#   - args: Service-specific parameters
#   - layers: Middleware layers applied to this service (optional)

services:
  # Echo service - simplest test service, echoes requests back
  - name: echo
    kind: echo.echo
    args: {}

  # Chain proxy service (through upstream H3 proxy)
  - name: chain
    kind: http_upstream.upstream
    args:
      upstream: local_relay
    layers:
      - kind: access_log.file
        args:
          writer: "logs/access.log"

  # Direct proxy service with basic auth layer
  - name: direct_proxy
    kind: http_upstream.upstream
    args:
      upstream: direct
    layers:
      # Basic proxy authentication layer
      - kind: auth.basic_auth
        args:
          users:
            - username: "admin"
              password: "secret"
      # Access log layer (logs to audit file with JSON format)
      - kind: access_log.file
        args:
          writer: "logs/access.log"
          # Request context fields to include in log entries
          context_fields:
            - "basic_auth.user"
            - "upstream.connect_ms"

# -----------------------------------------------------------------------------
# Servers
# -----------------------------------------------------------------------------
# Servers define listening endpoints and route to services.
# Each server has:
#   - name: Server identifier for logging
#   - hostnames: Virtual hostnames for SNI/Host routing (optional)
#     Supports exact ("api.example.com") and wildcard ("*.example.com") patterns.
#     Empty = default/catch-all server.
#   - tls: Server-level TLS configuration (required for https/http3)
#   - listeners: List of listener names (references to top-level listeners)
#   - service: Service to route requests to

servers:
  # ---------------------------------------------------------------------------
  # Connect Proxy Server (with auth and client certificate)
  # ---------------------------------------------------------------------------
  # curl examples:
  #   # HTTP proxy (with basic auth)
  #   curl --proxy http://127.0.0.1:10080 -U "admin:secret" https://httpbin.org/ip
  #
  #   # HTTPS proxy (with basic auth + mTLS client cert)
  #   curl --resolve proxy.example.com:10443:127.0.0.1 \
  #        --proxy https://proxy.example.com:10443 \
  #        --proxy-cacert conf/certs/server-ca.crt \
  #        --proxy-cert conf/certs/client.crt \
  #        --proxy-key conf/certs/client.key \
  #        -U "admin:secret" \
  #        https://httpbin.org/ip
  #
  #   # HTTP/3 proxy (with basic auth + mTLS client cert)
  #   curl --resolve proxy.example.com:10443:127.0.0.1 \
  #        --proxy https://proxy.example.com:10443 --http3 \
  #        --proxy-cacert conf/certs/server-ca.crt \
  #        --proxy-cert conf/certs/client.crt \
  #        --proxy-key conf/certs/client.key \
  #        -U "admin:secret" \
  #        https://httpbin.org/ip
  #
  #   # SOCKS5 proxy (with auth)
  #   curl --socks5 127.0.0.1:11080 --proxy-user admin:secret https://httpbin.org/ip
  - name: connect_proxy
    tls:
      certificates:
        - cert_path: conf/certs/server.crt
          key_path: conf/certs/server.key
      client_ca_certs:
        - conf/certs/client-ca.crt
    listeners:
      - http_connect
      - https_connect
      - http3_connect
      - socks5_connect
    service: direct_proxy

  # ---------------------------------------------------------------------------
  # Chain Proxy Server (no auth required on this node)
  # ---------------------------------------------------------------------------
  # curl examples:
  #   # HTTP proxy (no auth required at entry node)
  #   curl --proxy http://127.0.0.1:8080 https://httpbin.org/ip
  #
  #   # HTTPS proxy (encrypted connection to proxy, no auth at entry)
  #   curl --resolve chain.example.com:8443:127.0.0.1 \
  #        --proxy https://chain.example.com:8443 \
  #        --proxy-cacert conf/certs/server-ca.crt \
  #        https://httpbin.org/ip
  #
  #   # HTTP/3 proxy (encrypted QUIC connection to proxy)
  #   curl --resolve chain.example.com:8443:127.0.0.1 \
  #        --proxy https://chain.example.com:8443 --http3 \
  #        --proxy-cacert conf/certs/server-ca.crt \
  #        https://httpbin.org/ip
  #
  #   # SOCKS5 proxy (with auth)
  #   curl --socks5 127.0.0.1:9080 --proxy-user admin:secret https://httpbin.org/ip
  - name: chain_proxy
    tls:
      certificates:
        - cert_path: conf/certs/server.crt
          key_path: conf/certs/server.key
    listeners:
      - http_chain
      - https_chain
      - http3_chain
      - socks5_chain
    service: chain

# =============================================================================
# Certificate Generation
# =============================================================================
# Run ./generate_certs.sh to generate test certificates:
#   conf/certs/server-ca.crt/key - Server CA
#   conf/certs/client-ca.crt/key - Client CA
#   conf/certs/server.crt/key    - Server certificate
#   conf/certs/client.crt/key    - Client certificate
