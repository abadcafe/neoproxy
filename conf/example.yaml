# =============================================================================
# NeoProxy Configuration File Example
# =============================================================================
# Usage: ./neoproxy -c conf/example.yaml
#
# Prerequisites:
#   1. Run ./generate_certs.sh to generate certificates
#   2. server.crt now contains full chain (server cert + CA cert)
#   3. Restart neoproxy after regenerating certificates
#
# Quick test without proxy chain:
#   curl http://127.0.0.1:8081/test  (echo server, returns request info)

# -----------------------------------------------------------------------------
# Global Settings
# -----------------------------------------------------------------------------

# Server threads - controls concurrent processing capacity
# Default: 4
server_threads: 2

# -----------------------------------------------------------------------------
# Listeners
# -----------------------------------------------------------------------------
# Listeners define how neoproxy accepts connections.
# Each listener has:
#   - name: Unique listener name (referenced by servers)
#   - kind: Listener type ("http", "https", "http3", "socks5")
#   - addresses: List of "host:port" addresses to bind
#   - args: Listener-type-specific parameters (optional)

listeners:
  # HTTP listener - no extra args
  - name: http_main
    kind: http
    addresses: ["127.0.0.1:8080"]

  # HTTPS listener - supports TLS handshake timeout
  - name: https_main
    kind: https
    addresses: ["127.0.0.1:8443"]
    args:
      # TLS handshake timeout (default: 5s)
      tls_handshake_timeout: "5s"

  # HTTP/3 listener - supports QUIC protocol tuning
  - name: http3_main
    kind: http3
    addresses: ["127.0.0.1:8443"]
    args:
      quic:
        # Max concurrent bidirectional QUIC streams (default: 100, range: 1-10000)
        max_concurrent_bidi_streams: 100
        # Max idle timeout (default: 5s)
        max_idle_timeout: "5s"
        # Initial MTU (default: 1200, range: 1200-9000)
        initial_mtu: 1200
        # QUIC send window (default: 10MiB)
        send_window: "10MiB"
        # QUIC receive window (default: 10MiB)
        receive_window: "10MiB"

  # SOCKS5 listener - supports handshake timeout and user authentication
  - name: socks5_main
    kind: socks5
    addresses: ["127.0.0.1:9080"]
    args:
      # Handshake timeout (default: 10s)
      handshake_timeout: "10s"
      # User/password authentication (omit for no auth)
      users:
        - username: "admin"
          password: "secret"

  # HTTP listener on alternate port (for entry_proxy)
  - name: http_alt
    kind: http
    addresses: ["127.0.0.1:10080"]

  # HTTPS listener on alternate port
  - name: https_alt
    kind: https
    addresses: ["127.0.0.1:10443"]

  # HTTP/3 listener on alternate port (for http3_proxy)
  - name: http3_alt
    kind: http3
    addresses: ["127.0.0.1:10443"]

  # SOCKS5 listener on alternate port (no auth)
  - name: socks5_alt
    kind: socks5
    addresses: ["127.0.0.1:11080"]

# -----------------------------------------------------------------------------
# Services
# -----------------------------------------------------------------------------
# Services define request handlers. Each service has:
#   - name: Service name (referenced by servers)
#   - kind: Service type in "plugin.service" format
#   - args: Service-specific parameters
#   - layers: Middleware layers applied to this service (optional)

services:
  # Echo service - simplest test service, echoes requests back
  - name: echo
    kind: echo.echo
    args: {}

  # HTTP CONNECT TCP tunnel service
  # Handles HTTP CONNECT requests for HTTPS proxying
  - name: connect_tcp
    kind: connect_tcp.connect_tcp
    args:
      # Timeout for TCP connect to target server (default: 10s)
      connect_timeout: "10s"
      # Idle timeout for tunnel data transfer (default: 60s)
      idle_timeout: "60s"

  # HTTP/3 chain proxy service
  # Forwards requests to upstream proxy servers via HTTP/3
  - name: http3_chain
    kind: http3_chain.http3_chain
    args:
      # Default credentials inherited by proxies without user/tls specified
      default_user:
        username: "default_user"
        password: "default_pass"
      default_tls:
        server_ca_path: conf/certs/server-ca.crt
      proxy_group:
        # Each proxy requires:
        #   - address: IP:port of upstream proxy
        #   - hostname: SNI hostname (optional, must match server cert SAN)
        #   - weight: Load balancing weight (must be > 0)
        #   - user: (optional) Authentication credentials (overrides default_user)
        #   - tls: (optional) TLS client certificate and CA (deep-merges with default_tls)
        - address: 127.0.0.1:10443
          hostname: "http3.example.com"
          weight: 1
          user:
            username: "admin"
            password: "secret"
          tls:
            client_cert_path: conf/certs/client.crt
            client_key_path: conf/certs/client.key
            server_ca_path: conf/certs/server-ca.crt

  # Connect TCP service with basic auth layer
  - name: connect_tcp_with_auth
    kind: connect_tcp.connect_tcp
    args:
      connect_timeout: "10s"
      idle_timeout: "60s"
    layers:
      # Basic proxy authentication layer
      - kind: auth.basic_auth
        args:
          users:
            - username: "admin"
              password: "secret"
      # Access log layer (logs to file)
      - kind: access_log.file
        args:
          # Request context fields to include in log entries
          context_fields:
            - "auth.basic_auth.user"
            - "connect_tcp.connect_tcp.connect_ms"

# -----------------------------------------------------------------------------
# Servers
# -----------------------------------------------------------------------------
# Servers define listening endpoints and route to services.
# Each server has:
#   - name: Server identifier for logging
#   - hostnames: Virtual hostnames for SNI/Host routing (optional)
#     Supports exact ("api.example.com") and wildcard ("*.example.com") patterns.
#     Empty = default/catch-all server.
#   - tls: Server-level TLS configuration (required for https/http3)
#   - listeners: List of listener names (references to top-level listeners)
#   - service: Service to route requests to

servers:
  # ---------------------------------------------------------------------------
  # HTTP/3 Proxy Server
  # ---------------------------------------------------------------------------
  # curl example:
  #   # Connect through HTTP/3 proxy (requires client certificate)
  #   curl --proxy https://127.0.0.1:9443 \
  #        --cacert conf/certs/server-ca.crt \
  #        --cert conf/certs/client.crt \
  #        --key conf/certs/client.key \
  #        -U "h3_user:h3_pass" \
  #        https://httpbin.org/ip
  - name: connect_proxy
    tls:
      certificates:
        - cert_path: conf/certs/server.crt
          key_path: conf/certs/server.key
      client_ca_certs:
        - conf/certs/client-ca.crt
    listeners:
      - http_alt
      - https_alt
      - http3_alt
      - socks5_alt
    service: connect_tcp

  # ---------------------------------------------------------------------------
  # Default Entry Proxy (no auth required)
  # ---------------------------------------------------------------------------
  # curl examples:
  #   # HTTP proxy
  #   curl --proxy http://127.0.0.1:8080 https://httpbin.org/ip
  #
  #   # SOCKS5 proxy (with auth)
  #   curl --socks5 127.0.0.1:1081 --proxy-user socks_user:socks_pass https://httpbin.org/ip
  #
  #   # HTTPS proxy (encrypted connection to proxy)
  #   curl --proxy https://127.0.0.1:8443 \
  #        --proxy-cacert conf/certs/server-ca.crt \
  #        https://httpbin.org/ip
  - name: main_proxy
    tls:
      certificates:
        - cert_path: conf/certs/server.crt
          key_path: conf/certs/server.key
    listeners:
      - http_main
      - https_main
      - http3_main
      - socks5_main
    service: http3_chain

# =============================================================================
# Certificate Generation
# =============================================================================
# Run ./generate_certs.sh to generate test certificates:
#   conf/certs/server-ca.crt/key - Server CA
#   conf/certs/client-ca.crt/key - Client CA
#   conf/certs/server.crt/key    - Server certificate
#   conf/certs/client.crt/key    - Client certificate
