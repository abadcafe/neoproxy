# =============================================================================
# NeoProxy Configuration File Example
# =============================================================================
# This file demonstrates the new configuration architecture where:
# - Listener kinds are renamed: http, https, http3, socks5
# - TLS, auth, and hostnames are configured at server level
# - Access log is enabled by default
#
# Usage: ./neoproxy -c conf/example.yaml

# -----------------------------------------------------------------------------
# Global Settings
# -----------------------------------------------------------------------------

# Worker threads - controls concurrent processing capacity
# Default: 1
worker_threads: 2

# Log directory - where application logs are written
# Default: "logs/"
log_directory: "logs/"

# -----------------------------------------------------------------------------
# Services
# -----------------------------------------------------------------------------
# Services define request handlers. Each service has:
#   - name: Service name (referenced by servers)
#   - kind: Service type in "plugin.service" format
#   - args: Service-specific parameters

services:
  # Echo service - simplest test service, echoes requests back
  - name: echo
    kind: echo.echo
    args: {}

  # HTTP CONNECT TCP tunnel service
  # Handles HTTP CONNECT requests for HTTPS proxying
  - name: connect_tcp
    kind: connect_tcp.connect_tcp

  # HTTP/3 chain proxy service
  # Forwards requests to upstream proxy servers via HTTP/3
  - name: http3_chain
    kind: http3_chain.http3_chain
    args:
      proxy_group:
        - address: 127.0.0.1:9443
          weight: 1
          credential:
            user:
              username: "h3_user"
              password: "h3_pass"
            client_cert_path: conf/certs/client.crt
            client_key_path: conf/certs/client.key
            server_ca_path: conf/certs/server-ca.crt

# -----------------------------------------------------------------------------
# Servers
# -----------------------------------------------------------------------------
# Servers define listening endpoints and route to services.
# Each server has:
#   - name: Server identifier for logging
#   - hostnames: Virtual hostnames for SNI/Host routing (optional)
#   - tls: Server-level TLS configuration (for https/http3)
#   - users: Server-level authentication (for http/https/socks5)
#   - listeners: List of listener configurations
#   - service: Service to route requests to

servers:
  # HTTP proxy with server-level auth
  - name: http_proxy
    hostnames: ["proxy.example.com"]
    users:
      - username: "admin"
        password: "secret"
    listeners:
      - kind: http
        args:
          addresses: ["127.0.0.1:8081"]
    service: http3_chain

  # HTTPS + HTTP/3 proxy with server-level TLS
  - name: https_proxy
    hostnames: ["secure.example.com"]
    tls:
      certificates:
        - cert_path: conf/certs/server.crt
          key_path: conf/certs/server.key
    users:
      - username: "admin"
        password: "secret"
    listeners:
      - kind: https
        args:
          addresses: ["127.0.0.1:8444"]
      - kind: http3
        args:
          addresses: ["127.0.0.1:8444"]
    service: http3_chain

  # SOCKS5 proxy
  - name: socks5_proxy
    users:
      - username: "socks_user"
        password: "socks_pass"
    listeners:
      - kind: socks5
        args:
          addresses: ["127.0.0.1:1081"]
          handshake_timeout: "10s"
    service: http3_chain

  # HTTP/3 chain proxy with mTLS
  - name: http3_chain_proxy
    hostnames: ["chain.example.com"]
    tls:
      certificates:
        - cert_path: conf/certs/server.crt
          key_path: conf/certs/server.key
      client_ca_certs:
        - conf/certs/client-ca.crt
    users:
      - username: "chain_user"
        password: "chain_pass"
    listeners:
      - kind: http3
        args:
          addresses: ["127.0.0.1:8443"]
    service: http3_chain

  # HTTP/3 proxy
  - name: http3_proxy
    hostnames: ["h3.example.com"]
    tls:
      certificates:
        - cert_path: conf/certs/server.crt
          key_path: conf/certs/server.key
      client_ca_certs:
        - conf/certs/client-ca.crt
    users:
      - username: "h3_user"
        password: "h3_pass"
    listeners:
      - kind: http3
        args:
          addresses: ["127.0.0.1:9443"]
    service: connect_tcp

  # Echo server (default - no hostnames)
  - name: echo_server
    tls:
      certificates:
        - cert_path: conf/certs/server.crt
          key_path: conf/certs/server.key
    listeners:
      - kind: http
        args:
          addresses: ["127.0.0.1:8082"]
      - kind: https
        args:
          addresses: ["127.0.0.1:8445"]
      - kind: http3
        args:
          addresses: ["127.0.0.1:8442"]
      - kind: socks5
        args:
          addresses: ["127.0.0.1:1082"]
          handshake_timeout: "10s"
    service: echo

  # Virtual host routing example - shares port 8080 with default_server
  - name: api_server
    hostnames: ["api.example.com"]
    listeners:
      - kind: http
        args:
          addresses: ["127.0.0.1:8080"]
    service: echo

  # Default server - matches all unmatched requests
  - name: default_server
    listeners:
      - kind: http
        args:
          addresses: ["127.0.0.1:8080"]
    service: echo

# =============================================================================
# Migration Guide
# =============================================================================
#
# Listener Kind Names (Old -> New):
#   hyper.listener -> http
#   http3.listener -> http3
#   fast_socks5.listener -> socks5
#   (new) https
#
# Server-Level Configuration:
#   TLS, auth, and hostnames are now configured at server level, not listener.
#
# Before (old format):
#   servers:
#     - name: my_server
#       listeners:
#         - kind: hyper.listener
#           args:
#             addresses: ["127.0.0.1:8080"]
#             auth:
#               users:
#                 - username: admin
#                   password: secret
#       service: echo
#
# After (new format):
#   servers:
#     - name: my_server
#       users:
#         - username: admin
#           password: secret
#       listeners:
#         - kind: http
#           args:
#             addresses: ["127.0.0.1:8080"]
#       service: echo
#
# HTTP/3 Listener Changes:
#   - 'address' (singular) deprecated, use 'addresses' (plural)
#   - 'server_cert_path', 'server_key_path' removed (use server-level tls)
#   - 'auth' removed (use server-level users)
#
# Access Log:
#   - Enabled by default (no config needed)
#   - Default path_prefix: "access.log"
#   - Default format: text
#
# =============================================================================
# Certificate Generation
# =============================================================================
# Run ./generate_certs.sh to generate test certificates:
#   conf/certs/server-ca.crt/key - Server CA
#   conf/certs/client-ca.crt/key - Client CA
#   conf/certs/server.crt/key    - Server certificate
#   conf/certs/client.crt/key    - Client certificate
