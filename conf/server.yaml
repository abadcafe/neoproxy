worker_threads: 2
log_directory: "logs/"

services: 
- name: echo
  kind: echo
  args: {}

servers:
- name: default
  listeners:
    - kind: hyper
      args:
        addresses: [ 0.0.0.0:8080, 0.0.0.0:8081 ]
        protocols: [ http ]
        hostnames: []
        certificates: []
  service: echo
