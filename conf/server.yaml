worker_threads: 2
log_directory: "logs/"

services: 
- name: echo
  kind: echo
  args: {}
- name: http3_chain
  kind: http3_chain
  args:
    proxy_group:
    - address: 127.0.0.1:8088
      weight: 1
    - address: 127.0.0.1:8089
      weight: 1
    ca_path: conf/ca

servers:
- name: default
  listeners:
    - kind: hyper
      args:
        addresses: [ 0.0.0.0:8081, 0.0.0.0:111111 ]
        protocols: [ http ]
        hostnames: []
        certificates: []
  service: echo
- name: http3-connect-proxy
  listeners:
    - kind: hyper
      args:
        addresses: [ 0.0.0.0:8080 ]
        protocols: [ http ]
        hostnames: []
        certificates: []
  service: http3_chain
