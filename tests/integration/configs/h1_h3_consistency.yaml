# H1/H3 Listener Consistency Test Configuration
#
# This configuration uses top-level listeners and server-level
# configuration for TLS, hostnames, and layers.
#
# NOTE: The integration tests use dynamically generated configs with
# unique ports. This file serves as documentation and for manual testing.

server_threads: 2

listeners:
  - name: http_main
    kind: http
    addresses: ["127.0.0.1:18080"]

  - name: http_alt
    kind: http
    addresses: ["127.0.0.1:18081"]

  - name: https_main
    kind: https
    addresses: ["127.0.0.1:18443"]

  - name: http3_main
    kind: http3
    addresses: ["127.0.0.1:18444"]
    args:
      quic:
        max_concurrent_bidi_streams: 100

services:
  - name: echo
    kind: echo.echo
    args: {}

servers:
  # Server with http listener
  - name: http_server
    hostnames: ["http.example.com"]
    listeners:
      - http_main
    service: echo

  # Server with https listener
  - name: https_server
    hostnames: ["https.example.com"]
    tls:
      certificates:
        - cert_path: conf/certs/server.crt
          key_path: conf/certs/server.key
    listeners:
      - https_main
    service: echo

  # Server with http3 listener
  - name: http3_server
    hostnames: ["h3.example.com"]
    tls:
      certificates:
        - cert_path: conf/certs/server.crt
          key_path: conf/certs/server.key
    listeners:
      - http3_main
    service: echo

  # Default server (no hostnames)
  - name: default_server
    listeners:
      - http_alt
    service: echo
